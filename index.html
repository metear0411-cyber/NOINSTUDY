<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>노인전문간호사 시험준비 v2</title>
  <!-- Open Graph (카카오톡·SNS 링크 공유 미리보기) -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="노인전문간호사 2026 합격 스터디">
  <meta property="og:description" content="580문제·100토픽 — 강의자료 기반 MCQ·플래시카드·SOAP 사례형 모바일 스터디 앱">
  <meta property="og:url" content="https://metear0411-cyber.github.io/NOINSTUDY/">
  <meta property="og:image" content="https://metear0411-cyber.github.io/NOINSTUDY/icon-512.svg">
  <meta name="twitter:card" content="summary">
  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#6b3fa0">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="노인전문간호사">
  <link rel="apple-touch-icon" href="icon-192.svg">
  <link rel="stylesheet" href="styles.css?v=20260614t">

  <!-- 데이터 파일 (전역 window 변수 방식 — file:// CORS 우회) -->
  <!-- v=20260428 : 캐시 갱신용 버전 — 데이터 수정 시 숫자 증가 -->
  <script src="data/subjects.js?v=20260611"></script>
  <script src="data/major/gero-disease.js?v=20260614t"></script>
  <script src="data/major/gero-ltc.js?v=20260614t"></script>
  <script src="data/major/gero-promotion.js?v=20260614t"></script>
  <script src="data/major/gero-eol.js?v=20260614t"></script>
  <script src="data/major/gero-nursing.js?v=20260614t"></script>
  <script src="data/common/assessment.js?v=20260614e"></script>
  <script src="data/common/pharmacology.js?v=20260614e"></script>
  <script src="data/common/pathophysiology.js?v=20260614e"></script>
  <script src="data/common/nursing-theory.js?v=20260614e"></script>
  <script src="data/common/nursing-research.js?v=20260614e"></script>
  <script src="data/common/advanced-practice.js?v=20260614e"></script>
  <script src="data/gichul.js?v=20260614t"></script>
  <script src="data/variation.js?v=20260614t"></script>
</head>
<body>

  <!-- 모바일 오버레이 -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <div class="app-shell">

    <!-- 좌측 Rail -->
    <aside class="subject-rail" id="subjectRail">
      <div class="rail-header">
        <div class="brand-block">
          <p class="kicker">노인전문간호사</p>
          <h1>2026 합격 스터디</h1>
        </div>
        <div class="exam-meter">
          <span id="daysLeft">D-???</span>
          <span>2026.07.05 시험</span>
        </div>
      </div>

      <!-- 학습 기록 내보내기/불러오기 -->
      <div class="rail-data-actions">
        <button class="data-action-btn" id="exportMarksBtn" type="button" title="학습 기록 JSON으로 내보내기">📤 내보내기</button>
        <button class="data-action-btn" id="importMarksBtn" type="button" title="학습 기록 JSON 불러오기">📥 불러오기</button>
        <input type="file" id="importMarksInput" accept=".json" style="display:none;">
      </div>

      <!-- 검색 -->
      <div class="rail-search">
        <input type="search" id="searchInput" placeholder="전체 토픽·키워드 검색" autocomplete="off">
      </div>

      <!-- 필터 탭 -->
      <div class="mode-row">
        <button class="mode-button is-active" data-filter="all" type="button">전체</button>
        <button class="mode-button" data-filter="major" type="button">전공</button>
        <button class="mode-button" data-filter="common" type="button">공통</button>
      </div>

      <!-- 기출문제 진입 버튼 -->
      <button class="gichul-entry-btn" id="gichulEntryBtn" type="button">📝 기출문제 풀기</button>

      <!-- 과목 목록 -->
      <div class="subject-list" id="subjectList"></div>
    </aside>

    <!-- 우측 메인 -->
    <main class="study-workspace" id="studyWorkspace">

      <!-- 모바일 햄버거 -->
      <button class="hamburger" id="hamburgerBtn" type="button" aria-label="메뉴 열기">
        <span></span><span></span><span></span>
      </button>

      <!-- 과목 헤더 -->
      <div class="overview-band" id="overviewBand">
        <div class="weight-ring" id="weightRing" style="--value:0">
          <strong>0%</strong>
          <span>출제 비중</span>
        </div>
        <div class="overview-copy">
          <p class="subject-meta" id="subjectMeta"></p>
          <h2 id="subjectTitle"></h2>
          <p id="subjectSummary"></p>
          <div class="chip-row" id="focusChips"></div>
        </div>
      </div>

      <!-- 기출문제 패널 (기출문제 모드 시 표시) -->
      <div id="gichulPanel" class="gichul-panel" style="display:none;">
        <div class="gichul-header">
          <button id="gichulExitBtn" type="button" class="gichul-exit-btn">← 학습으로</button>
          <div class="gichul-title-block">
            <h2>📝 기출문제 연습</h2>
          </div>
          <span id="gichulProgress" class="gichul-progress"></span>
        </div>
        <div id="gichulModeBar" class="gichul-mode-bar"></div>
        <div id="gichulTypeBar" class="gichul-type-bar"></div>
        <div id="gichulChapterBar" class="gichul-chapter-bar"></div>
        <div id="gichulContent" class="lesson-body"></div>
      </div>

      <!-- 토픽 + 학습 그리드 -->
      <div class="content-grid" id="contentGrid">

        <!-- 토픽 패널 -->
        <div class="part-panel">
          <div class="panel-heading">
            <h3>토픽</h3>
            <button class="tool-button" id="memoryToggle" type="button" aria-pressed="false">암기 집중</button>
          </div>
          <div class="part-list" id="partList"></div>
        </div>

        <!-- 학습 패널 -->
        <div class="lesson-panel">
          <div class="lesson-head">
            <div>
              <p class="priority-label" id="topicPriority"></p>
              <h3 id="topicTitle"></h3>
            </div>
            <div class="lesson-actions">
              <!-- 학습 모드 탭 -->
              <div class="mode-tabs-inline">
                <button class="tab-btn is-active" data-mode="study" type="button">학습</button>
                <button class="tab-btn" data-mode="quiz" type="button">퀴즈</button>
                <button class="tab-btn" data-mode="flash" type="button">플래시카드</button>
              </div>
              <!-- 마크 버튼 -->
              <button class="icon-button focus-toggle-btn" id="focusToggle" title="넓게 보기 (사이드바·토픽목록 접기)" type="button" aria-pressed="false">⤢</button>
              <button class="icon-button" id="printButton" title="A4 인쇄" type="button">🖨</button>
              <button class="icon-button" id="bookmarkButton" title="북마크" type="button" aria-pressed="false">★</button>
              <button class="icon-button" id="doneButton" title="완료" type="button" aria-pressed="false">✓</button>
              <button class="icon-button" id="weakButton" title="약점" type="button" aria-pressed="false">!</button>
            </div>
          </div>

          <!-- 학습 모드 -->
          <div id="modeStudy" class="lesson-body"></div>

          <!-- 퀴즈 모드 -->
          <div id="modeQuiz" class="lesson-body" style="display:none;"></div>

          <!-- 플래시카드 모드 -->
          <div id="modeFlash" class="lesson-body" style="display:none;"></div>
        </div>

      </div>
    </main>
  </div>

  <!-- 집중모드 플로팅 토글 (스크롤 위치 무관 좌하단 상시 노출) -->
  <button class="focus-fab" id="focusToggleFloat" type="button" title="넓게 보기 / 펼치기" aria-pressed="false">⤢ 펼치기</button>

  <script src="app.js?v=20260614t"></script>
  <script src="notes-bridge.js?v=20260531"></script>
  <!-- Service Worker 등록 -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./service-worker.js')
          .then(reg => console.log('[SW] 등록 완료:', reg.scope))
          .catch(err => console.warn('[SW] 등록 실패:', err));
      });
    }
  </script>
</body>
</html>
