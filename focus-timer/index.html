<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>집중 타이머</title>
<meta name="theme-color" content="#1259C3">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="집중 타이머">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon.svg">
<style>
*{box-sizing:border-box;margin:0;padding:0}html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,"Noto Sans KR","Apple SD Gothic Neo",Segoe UI,sans-serif;background:#f2f2f7;color:#1c1c1e}body{display:flex;align-items:center;justify-content:center;padding:22px}.app{width:min(900px,100%);display:grid;grid-template-columns:1.25fr .85fr;gap:26px;align-items:center}.timer-card,.card{background:#fff;border-radius:30px;box-shadow:0 2px 8px #0001,0 12px 34px #00000012}.timer-card{padding:34px;display:grid;place-items:center}.dial{width:min(330px,78vw);aspect-ratio:1;position:relative}.dial svg{width:100%;height:100%;transform:rotate(-90deg)}circle{fill:none;stroke-width:18}.track{stroke:#e8effc}.progress{stroke:#1259c3;stroke-linecap:round;transition:stroke-dashoffset .55s linear,stroke .25s}.center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px}.time{font-size:clamp(52px,11vw,76px);font-weight:800;letter-spacing:-.05em;font-variant-numeric:tabular-nums}.label{font-size:15px;font-weight:800;color:#1259c3;letter-spacing:.08em}.panel{display:flex;flex-direction:column;gap:16px}.card{padding:22px}.eyebrow{font-size:12px;color:#aeaeb2;font-weight:800;letter-spacing:.14em}.title{font-size:23px;font-weight:900;margin-top:4px}.modes{display:flex;gap:8px}.mode,.secondary,.primary{border:0;cursor:pointer;font:inherit}.mode{flex:1;border-radius:20px;padding:12px 0;background:#f7f7fa;color:#6e6e73;font-weight:800}.mode.active{background:#1259c3;color:#fff}.controls{display:flex;align-items:center;gap:14px}.primary{width:70px;height:70px;border-radius:50%;background:#1259c3;color:white;font-size:28px;box-shadow:0 6px 18px #1259c355}.secondary{width:52px;height:52px;border-radius:50%;background:#f7f7fa;color:#6e6e73;font-size:24px}.next{margin-left:auto;text-align:right}.next small{display:block;color:#aeaeb2;font-weight:700}.next strong{color:#1259c3;font-size:17px}.row{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;color:#6e6e73;font-weight:800}.reset-all{display:none;background:transparent;border:0;color:#aeaeb2;font-weight:800}.dots{display:flex;gap:7px;flex-wrap:wrap;min-height:15px;margin-bottom:14px}.dot{width:13px;height:13px;border-radius:50%;background:#e8effc}.dot.done{background:#1259c3;box-shadow:0 0 0 3px #1259c31f}.sep{width:1px;height:13px;background:#ddd}.stats{display:flex;justify-content:space-between;align-items:end}.big{font-size:32px;font-weight:900;color:#1259c3}.hint{text-align:center;font-size:12px;color:#aeaeb2;font-weight:700;letter-spacing:.05em}@media(max-width:720px){body{align-items:flex-start;overflow:auto}.app{grid-template-columns:1fr;max-width:430px}.timer-card{padding:24px}.panel{width:100%}}
</style>
</head>
<body>
<main class="app">
  <section class="timer-card">
    <div class="dial">
      <svg viewBox="0 0 300 300" aria-hidden="true"><circle class="track" cx="150" cy="150" r="126"></circle><circle id="progress" class="progress" cx="150" cy="150" r="126"></circle></svg>
      <div class="center"><div id="time" class="time">25:00</div><div id="label" class="label">준비</div></div>
    </div>
  </section>
  <section class="panel">
    <div class="card"><div class="eyebrow">노인전문간호사</div><div class="title">집중 타이머</div></div>
    <div class="card modes" id="modes"><button class="mode active" data-min="25">25분</button><button class="mode" data-min="30">30분</button><button class="mode" data-min="45">45분</button></div>
    <div class="card controls"><button id="play" class="primary">▶</button><button id="reset" class="secondary">↺</button><div class="next"><small id="nextLabel">다음</small><strong id="nextText">휴식 5분</strong></div></div>
    <div class="card"><div class="row"><span>오늘 세션</span><button id="resetAll" class="reset-all">초기화</button></div><div id="dots" class="dots"></div><div class="stats"><div><span id="sets" class="big">0</span> 세트</div><div id="mins">0분 집중</div></div></div>
    <div class="hint">4세트마다 15분 긴 휴식 자동 전환</div>
  </section>
</main>
<script>
const C=2*Math.PI*126, blue='#1259C3', green='#00A389';
let selected=25,total=1500,left=1500,running=false,breakMode=false,completed=0,sets=0,timer=null;
const $=s=>document.querySelector(s), $$=s=>document.querySelectorAll(s);
const progress=$('#progress'), time=$('#time'), label=$('#label'), play=$('#play'), dots=$('#dots');
progress.style.strokeDasharray=C;
function fmt(n){return String(Math.floor(n/60)).padStart(2,'0')+':'+String(n%60).padStart(2,'0')}
function draw(){
  time.textContent=fmt(left);
  progress.style.strokeDashoffset=C*(1-left/total);
  const col=breakMode?green:blue;
  progress.style.stroke=col; label.style.color=col; play.style.background=col;
  label.textContent=breakMode?(completed%4===0?'긴 휴식':'짧은 휴식'):(running?'집중 중':(left===total?'준비':'일시정지'));
  play.textContent=running?'⏸':'▶';
  $('#nextLabel').textContent=breakMode?'집중 후':'다음';
  $('#nextText').textContent=breakMode?selected+'분 집중':(completed%4===3?'15분 긴 휴식':'5분 휴식');
  $('#nextText').style.color=col; $('#sets').textContent=sets; $('#sets').style.color=col; $('#mins').textContent=(sets*selected)+'분 집중';
  $('#resetAll').style.display=sets?'block':'none';
  dots.innerHTML=''; for(let i=0;i<Math.max(4,sets);i++){let d=document.createElement('span');d.className='dot'+(i<sets?' done':'');dots.append(d);if((i+1)%4===0&&i<Math.max(4,sets)-1){let s=document.createElement('span');s.className='sep';dots.append(s)}}
  $$('.mode').forEach(b=>b.disabled=running);
}
function start(){timer=setInterval(()=>{if(left<=1){clearInterval(timer);running=false;left=0;draw();setTimeout(nextPhase,600);return}left--;draw()},1000)}
function nextPhase(){if(!breakMode){completed++;sets++;breakMode=true;total=(completed%4===0?15:5)*60;left=total;running=true;start()}else{breakMode=false;total=selected*60;left=total}draw()}
play.onclick=()=>{running=!running;if(running)start();else clearInterval(timer);draw()};
$('#reset').onclick=()=>{clearInterval(timer);running=false;breakMode=false;total=selected*60;left=total;draw()};
$('#resetAll').onclick=()=>{clearInterval(timer);running=false;breakMode=false;sets=0;completed=0;total=selected*60;left=total;draw()};
$$('.mode').forEach(b=>b.onclick=()=>{if(running)return;$$('.mode').forEach(x=>x.classList.remove('active'));b.classList.add('active');selected=Number(b.dataset.min);total=selected*60;left=total;breakMode=false;draw()});
draw();
if('serviceWorker' in navigator){addEventListener('load',()=>navigator.serviceWorker.register('./sw.js'))}
</script>
</body>
</html>
